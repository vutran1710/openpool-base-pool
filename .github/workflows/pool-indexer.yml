name: Rebuild Index

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download action-tool
        run: |
          curl -sL https://github.com/vutran1710/regcrypt/releases/latest/download/action-tool-linux-amd64 -o action-tool
          chmod +x action-tool

      - name: Rebuild and upload index
        env:
          OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
          INDEXER_WEIGHTS: ${{ secrets.INDEXER_WEIGHTS }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ./action-tool index \
            --pool-json pool.json \
            --operator-key "$OPERATOR_PRIVATE_KEY" \
            --users-dir users/ \
            --output index.db \
            --upload
