name: Process Registration

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.labels.*.name, 'registration')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Download tools
        run: |
          curl -sL https://github.com/vutran1710/regcrypt/releases/latest/download/regcrypt-linux-amd64 -o regcrypt
          curl -sL https://github.com/vutran1710/regcrypt/releases/latest/download/indexer-linux-amd64 -o indexer
          chmod +x regcrypt indexer

      - name: Parse and register
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          POOL_SALT: ${{ secrets.POOL_SALT }}
          OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
          INDEXER_WEIGHTS: ${{ secrets.INDEXER_WEIGHTS }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # First line = hex blob
          BLOB_HEX=$(echo "$ISSUE_BODY" | head -1 | tr -d '[:space:]')

          if [ -z "$BLOB_HEX" ]; then
            echo "::error::Missing blob in issue body"
            gh issue comment "$ISSUE_NUMBER" --body "Registration rejected: missing profile blob."
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            exit 0
          fi

          if [ -z "$POOL_SALT" ]; then
            echo "::error::POOL_SALT secret not configured"
            exit 1
          fi

          # Extract pubkey from blob (first 32 bytes = 64 hex chars)
          PUB_KEY=$(echo "$BLOB_HEX" | cut -c1-64)

          # Compute hashes + encrypt for user
          OUTPUT=$(./regcrypt \
            --pool-url "$REPO" \
            --provider "github" \
            --user-id "$ISSUE_AUTHOR_ID" \
            --salt "$POOL_SALT" \
            --user-pubkey "$PUB_KEY")

          BIN_HASH=$(echo "$OUTPUT" | sed -n '1p')
          MATCH_HASH=$(echo "$OUTPUT" | sed -n '2p')
          ENCRYPTED_BLOB=$(echo "$OUTPUT" | sed -n '3p')

          # Post encrypted hashes as comment (CLI will poll for this)
          gh issue comment "$ISSUE_NUMBER" --body "$ENCRYPTED_BLOB"

          # Write .bin file
          mkdir -p users
          echo "$BLOB_HEX" | xxd -r -p > "users/${BIN_HASH}.bin"

          # Index user vector (skip if no schema or no operator key)
          if [ -n "$OPERATOR_PRIVATE_KEY" ] && [ -f pool.json ]; then
            mkdir -p index
            ./indexer \
              --pool-json pool.json \
              --operator-key "$OPERATOR_PRIVATE_KEY" \
              --bin-file "users/${BIN_HASH}.bin" \
              --match-hash "$MATCH_HASH" \
              --output-dir index/ || echo "::warning::Indexer failed, skipping vector"
          fi

          # Commit and push (with retry for concurrent registrations)
          git config user.name "dating-bot"
          git config user.email "bot@dating-pool.dev"
          git add "users/${BIN_HASH}.bin"
          git add index/ 2>/dev/null || true
          git commit -m "Register user ${BIN_HASH}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done

      - name: Close issue
        if: success()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "$ISSUE_NUMBER" --reason completed

      - name: Handle failure
        if: failure()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Registration failed. Please retry."
          gh issue close "$ISSUE_NUMBER" --reason "not planned"
